              event_order_ref:
                $ref: "#/components/schemas/ProofEvidenceRef"
              measurement_proof_ref:
                $ref: "#/components/schemas/ProofEvidenceRef"
              measurement_relation_proof_ref:
                $ref: "#/components/schemas/ProofEvidenceRef"
              measurement_relation:
                type: object
                additionalProperties: true
                properties:
                  relation_id:
                    type: string
                  accepted:
                    type: [boolean, string]
                  calibration_ref:
                    type: string
                    pattern: "^(artifact:.+|sha(256|384|512):.+)$"
                  latency_ref:
                    type: string
                    pattern: "^(artifact:.+|sha(256|384|512):.+)$"
                  dependency_ref:
                    type: string
                    pattern: "^(artifact:.+|sha(256|384|512):.+)$"
                  event_order_ref:
                    type: string
                    pattern: "^(artifact:.+|sha(256|384|512):.+)$"
                  proof_ref:
                    type: string
                    pattern: "^(artifact:.+|sha(256|384|512):.+)$"
                  proof_refs:
                    type: array
                    items:
                      type: string
                      pattern: "^(artifact:.+|sha(256|384|512):.+)$"
              representation_relation:
                oneOf:
                  - $ref: "#/components/schemas/RepresentationRelation"
                  - type: array
                    items:
                      $ref: "#/components/schemas/RepresentationRelation"
              representation_proof_ref:
                $ref: "#/components/schemas/ProofEvidenceRef"
              prefix_adjudication_proof_ref:
                $ref: "#/components/schemas/ProofEvidenceRef"
              target_adjudication_proof_ref:
                $ref: "#/components/schemas/ProofEvidenceRef"
              adequacy_proof_ref:
                $ref: "#/components/schemas/ProofEvidenceRef"
        observation_policy:
          type: object
        frame:
          type: object
        completion_policy:
          type: object
        target_condition:
          type: object
        prefix_view:
          type: [object, "null"]
        validity_status:
          enum: [pass, unknown, conflict, expired]
        completion_admission:
          type: [object, "null"]
        fiber_assoc_view:
          type: [object, "null"]
        adjudication_views:
          type: object
          additionalProperties:
            type: string
        adequacy_direction:
          type: string
        confluence_proof:
          oneOf:
            - type: string
              pattern: "^(artifact:.+|sha(256|384|512):.+)$"
            - type: object
              required: [proof_kind, artifact_ref]
              allOf:
                - anyOf:
                    - required: [status]
                    - required: [proof_status]
                    - required: [checker_status]
                - anyOf:
                    - required: [artifact_digest]
                    - required: [digest]
                    - required: [reference_digest]
              additionalProperties: true
              properties:
                proof_kind:
                  type: string
                status:
                  type: string
                proof_status:
                  type: string
                checker_status:
                  type: string
                artifact_ref:
                  type: string
                  pattern: "^(artifact:.+|sha(256|384|512):.+)$"
                source_artifact:
                  type: string
                  pattern: "^(artifact:.+|sha(256|384|512):.+)$"
                source_path:
                  type: string
                  pattern: "^/.*$"
                artifact_digest:
                  type: string
                  pattern: "^sha(256|384|512):.+"
                digest:
                  type: string
                  pattern: "^sha(256|384|512):.+"
                reference_digest:
                  type: string
                  pattern: "^sha(256|384|512):.+"
                event_ids:
                  type: array
                  items:
                    type: string
                accepted_event_ids:
                  type: array
                  items:
                    type: string
                covered_event_ids:
                  type: array
                  items:
                    type: string
            - type: "null"
    AuthorityOutcome:
      type: object
      required:
        - layer
        - code
        - direction
        - gate_decision
        - reason_refs
        - reason_ref_records
        - blocking_records
      properties:
        layer:
          type: string
          enum: [issue, represented, operational, status, policy]
        code:
          type: string
        direction:
          type: string
          enum: [positive, negative, infeasible, neutral, none]
        gate_decision:
          type: string
        reason_refs:
          type: array
          items:
            type: string
        reason_ref_records:
          type: array
          items:
            $ref: "#/components/schemas/TypedReasonRefRecord"
        blocking_records:
          type: array
          items:
            $ref: "#/components/schemas/AuthorityBlockingRecord"
      oneOf:
        - properties:
            layer:
              const: issue
            code:
              enum: [assert, deny, infeasible, abstain, unknown, conflict, invalid]
          allOf:
            - if:
                properties:
                  code:
                    const: assert
              then:
                properties:
                  direction:
                    const: positive
            - if:
                properties:
                  code:
                    const: deny
              then:
                properties:
                  direction:
                    const: negative
            - if:
                properties:
                  code:
                    const: infeasible
              then:
                properties:
                  direction:
                    const: infeasible
            - if:
                properties:
                  code:
                    const: abstain
              then:
                properties:
                  direction:
                    const: neutral
            - if:
                properties:
                  code:
                    enum: [unknown, conflict, invalid]
              then:
                properties:
                  direction:
                    const: none
        - properties:
            layer:
              const: represented
            code:
              enum: [assert, deny, infeasible, abstain, unknown, conflict, invalid]
          allOf:
            - if:
                properties:
                  code:
                    const: assert
              then:
                properties:
                  direction:
                    const: positive
            - if:
                properties:
                  code:
                    const: deny
              then:
                properties:
                  direction:
                    const: negative
            - if:
                properties:
                  code:
                    const: infeasible
              then:
                properties:
                  direction:
                    const: infeasible
            - if:
                properties:
                  code:
                    const: abstain
              then:
                properties:
                  direction:
                    const: neutral
            - if:
                properties:
                  code:
                    enum: [unknown, conflict, invalid]
              then:
                properties:
                  direction:
                    const: none
        - properties:
            layer:
              const: operational
            code:
              enum: [accept, reject, indeterminate, unknown, conflict, out_of_frame]
          allOf:
            - if:
                properties:
                  code:
                    const: accept
              then:
                properties:
                  direction:
                    const: positive
            - if:
                properties:
                  code:
                    const: reject
              then:
                properties:
                  direction:
                    const: negative
            - if:
                properties:
                  code:
                    const: indeterminate
              then:
                properties:
                  direction:
                    const: neutral
            - if:
                properties:
                  code:
                    enum: [unknown, conflict, out_of_frame]
              then:
                properties:
                  direction:
                    const: none
        - properties:
            layer:
              const: status
            code:
              enum: [active, unknown, conflict, out_of_frame, expired, revoked, superseded, invalid]
            direction:
              const: none
        - properties:
            layer:
              const: policy
            code:
              enum: [allow, block, unknown]
            direction:
              const: none
