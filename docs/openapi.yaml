    ObligationRefRecord:
      type: object
      required: [obligation_id, kind, status]
      allOf:
        - if:
            properties:
              status:
                const: waived
            required: [status]
          then:
            required: [reason_refs]
            properties:
              reason_refs:
                minItems: 1
        - if:
            properties:
              status:
                const: pass
            required: [status]
          then:
            required: [source_artifact, source_path, digest]
            properties:
              source_artifact:
                type: string
                pattern: "^artifact:.+"
              source_path:
                type: string
                pattern: "^/.+"
              digest:
                type: string
                pattern: "^sha(256|384|512):.+"
      properties:
        obligation_id:
          type: string
        kind:
          type: string
        status:
          enum: [pass, fail, unknown, waived, inactive, not_checked]
        scope:
          type: array
          items:
            type: string
        checker:
          type: [string, "null"]
        expiry:
          type: [string, "null"]
        reason_refs:
          type: array
          items:
            type: string
        source_artifact:
          type: [string, "null"]
          minLength: 1
        source_path:
          type: [string, "null"]
          pattern: "^(|/.*)$"
        digest:
          type: [string, "null"]
          pattern: "^sha(256|384|512):.+"
    ProofRefRecord:
