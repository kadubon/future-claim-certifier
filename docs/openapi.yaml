          pattern: "^(|/.*)$"
        digest:
          type: [string, "null"]
        status:
          type: string
      allOf:
        - if:
            properties:
              status:
                enum: [accepted, pass]
            required: [status]
          then:
            properties:
              digest:
                type: string
                pattern: "^sha(256|384|512):.+"
            required: [digest]
