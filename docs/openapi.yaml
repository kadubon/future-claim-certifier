openapi: 3.1.0
info:
  title: Dynamic Future-Claim Certification API
  version: 1.1.0.dev0
  license:
    name: Apache-2.0
paths:
  /certify:
    post:
      summary: Issue an immutable DFCC certificate
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [claim, bundle, anchor, time_basis]
      responses:
        "200":
          description: IssueCertificate or ValidationResult
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: "#/components/schemas/IssueCertificate"
                  - $ref: "#/components/schemas/ValidationResult"
  /check:
    post:
      summary: Recompute status-time authority
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [certificate, proposed_use, status_context]
              properties:
                certificate:
                  type: object
                proposed_use:
                  $ref: "#/components/schemas/ProposedUse"
                status_context:
                  $ref: "#/components/schemas/StatusContext"
      responses:
        "200":
          description: StatusAuthorityView or ValidationResult
  /replay-status:
    post:
      summary: Replay lifecycle and status authority from three records or an ArtifactBundle
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              oneOf:
                - required: [certificate, proposed_use, status_context]
                - required: [bundle]
              properties:
                certificate: {}
                proposed_use:
                  $ref: "#/components/schemas/ProposedUse"
                status_context:
                  $ref: "#/components/schemas/StatusContext"
                bundle:
                  $ref: "#/components/schemas/ArtifactBundle"
      responses:
        "200":
          description: StatusAuthorityView, PipelineReport, or ValidationResult with artifact refs, typed ledger entries, proof refs, and stage blockers on non-allow status views
  /validate-bundle:
    post:
      summary: Validate an artifact bundle or compile a finite assumption bundle
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [bundle]
              properties:
                bundle:
                  oneOf:
                    - $ref: "#/components/schemas/ArtifactBundle"
                    - type: object
                horizon:
                  type: integer
                  minimum: 0
                  description: Required only when bundle is a finite assumption bundle rather than an ArtifactBundle.
                full_replay:
                  type: boolean
                  default: false
                  description: Require ArtifactBundle validation to replay through authority recomputation.
      responses:
        "200":
          description: PipelineReport with authority_view, authority_outcome_digest, resolved authority runtime summary, proof refs, typed reference-ledger entries, accepted clauses, trust assumptions, guard records, or finite compilation summary
  /schema/list:
    get:
      summary: List bundled DFCC JSON Schemas
      responses:
        "200":
          description: Schema name list
  /schema/export/{name}:
    get:
      summary: Export a bundled DFCC JSON Schema
      parameters:
        - name: name
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: JSON Schema document
  /conformance/run:
    post:
      summary: Run packaged or supplied DFCC golden conformance cases
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                case_dir:
                  type: string
                  description: Optional local case directory for CLI-compatible runners
                suite:
                  type: string
                  description: Optional suite filter. Use primary for protocol fixtures or legacy for all legacy compatibility suites.
      responses:
        "200":
          description: GoldenResult list fixed by required expected_digest canonical keys by default. Legacy compatibility cases must opt out with canonical_equality_required=false, and artifact-bundle cases, including packaged authority fixtures, materialize to ArtifactBundle full replay unless full_replay=false is explicit.
  /digest:
    post:
      summary: Compute canonical JSON digest
      requestBody:
        required: true
        content:
          application/json:
            schema: {}
      responses:
        "200":
          description: Digest string
components:
  schemas:
    ArtifactBundle:
      type: object
      required: [bundle_id, manifest, artifacts]
    IssueCertificate:
      type: object
      additionalProperties: false
      required:
        - certificate_id
        - schema_profile_ref
        - canonicalization_profile_ref
        - manifest_digest
        - claim_ref
        - anchor_ref
        - time_basis_ref
        - event_order_commitment_ref
        - assessment_frame_ref
        - assumption_bundle_ref
        - initial_context_ref
        - representation_interface_ref
        - completion_interface_ref
        - compiled_semantics_ref
        - set_refs
        - set_ref_records
        - proof_refs
        - proof_ref_records
        - kernel_verdict_at_issue
        - soundness_grade
        - dependency_graph_ref
        - artifact_refs
        - artifact_ref_records
        - obligation_refs
        - obligation_ref_records
        - provenance_refs
      properties:
        certificate_id:
          type: string
          minLength: 1
        schema_profile_ref:
          type: string
        canonicalization_profile_ref:
          type: string
        manifest_digest:
          type: string
        claim_ref:
          type: string
        anchor_ref:
          type: string
        time_basis_ref:
          type: string
        event_order_commitment_ref:
          type: string
        assessment_frame_ref:
          type: string
        assumption_bundle_ref:
          type: string
        initial_context_ref:
          type: string
        representation_interface_ref:
          type: string
        completion_interface_ref:
          type: string
        compiled_semantics_ref:
          type: string
        set_refs:
          type: array
          items:
            type: string
        set_ref_records:
          type: array
          items:
            $ref: "#/components/schemas/SetRef"
        proof_refs:
          type: array
          minItems: 1
          items:
            type: string
        proof_ref_records:
          type: array
          minItems: 1
          items:
            allOf:
              - $ref: "#/components/schemas/ProofRefRecord"
              - type: object
                required: [source_artifact, source_path, digest, status]
                properties:
                  source_artifact:
                    type: string
                    pattern: "^artifact:.+"
                  source_path:
                    type: string
                    pattern: "^/.*$"
                  digest:
                    type: string
                    pattern: "^sha(256|384|512):.+"
                  status:
                    enum: [accepted, pass]
        kernel_verdict_at_issue:
          enum: [assert, deny, infeasible, abstain, unknown, conflict, invalid]
        soundness_grade:
          type: integer
          minimum: 1
          maximum: 5
        dependency_graph_ref:
          type: string
        artifact_refs:
          type: array
          items:
            type: string
        artifact_ref_records:
          type: array
          items:
            $ref: "#/components/schemas/ArtifactRef"
        obligation_refs:
          type: array
          items:
            type: string
        obligation_ref_records:
          type: array
          items:
            $ref: "#/components/schemas/ObligationRefRecord"
        provenance_refs:
          type: array
          items:
            type: string
        claim_source:
          type: object
        bundle_source:
          type: object
        anchor_source:
          type: object
        time_basis_source:
          type: object
        frame:
          type: object
        policy:
          type: object
    PipelineReport:
      type: object
      required:
        - bundle_id
        - profile
        - stage_results
        - artifact_refs
        - artifact_ref_records
        - ledger_entries
        - proof_refs
        - proof_ref_records
        - stage_artifacts
        - protocol_records
        - failure_records
        - reason_refs
        - reason_ref_records
        - stage_blockers
      properties:
        bundle_id:
          type: string
        profile:
          type: string
        stage_results:
          type: array
          items:
            $ref: "#/components/schemas/ValidationResult"
        artifact_refs:
          type: array
          items:
            type: string
        artifact_ref_records:
          type: array
          items:
            $ref: "#/components/schemas/ArtifactRef"
        ledger_entries:
          type: array
          items:
            $ref: "#/components/schemas/ReferenceLedgerEntry"
        accepted_clause_records:
          type: array
          items:
            $ref: "#/components/schemas/AcceptedClause"
        proof_refs:
          type: array
          items:
            type: string
        proof_ref_records:
          type: array
          items:
            $ref: "#/components/schemas/ProofRef"
        stage_artifacts:
          type: object
          propertyNames:
            enum: [Parse, Canonicalize, SchemaValidate, DigestCheck, ReferenceResolve, ProfileResolve, Replay, GuardEvaluate, KernelCheck, AuthorityEmit]
          additionalProperties:
            type: array
            items:
              type: string
        protocol_records:
          type: array
          items:
            $ref: "#/components/schemas/ProtocolRecordArtifact"
        replay_trace:
          oneOf:
            - $ref: "#/components/schemas/ReplayTrace"
            - type: "null"
        kernel_view_ref:
          type: [string, "null"]
        observation_context_ref:
          type: [string, "null"]
        agreement_ref:
          type: [string, "null"]
        runtime_summary_digest:
          type: [string, "null"]
        authority_runtime_summary:
          oneOf:
            - $ref: "#/components/schemas/ResolvedAuthorityRuntime"
            - type: "null"
        authority_outcome_digest:
          type: [string, "null"]
        failure_records:
          type: array
          items:
            $ref: "#/components/schemas/FailureRecord"
        reason_refs:
          type: array
          items:
            type: string
        reason_ref_records:
          type: array
          items:
            $ref: "#/components/schemas/ReasonRefRecord"
        stage_blockers:
          type: array
          items:
            $ref: "#/components/schemas/FailureRecord"
    ProfileResolution:
      type: object
      required:
        - requested_profile
        - implemented_profile
        - version_relation
        - enabled_features
        - closed_world
        - extension_mapping
        - status
        - reason_refs
      properties:
        requested_profile:
          type: string
        implemented_profile:
          type: [string, "null"]
        version_relation:
          enum: [exact, compatible, unsupported, unknown]
        enabled_features:
          type: array
          items:
            type: string
        closed_world:
          type: boolean
        extension_mapping:
          type: object
          additionalProperties:
            type: string
        status:
          enum: [pass, unsupported_profile, checker_unknown, schema_invalid]
        reason_refs:
          type: array
          items:
            type: string
      allOf:
        - if:
            properties:
              status:
                const: unsupported_profile
            required: [status]
          then:
            properties:
              implemented_profile:
                type: "null"
              version_relation:
                const: unsupported
              enabled_features:
                maxItems: 0
              extension_mapping:
                maxProperties: 0
              reason_refs:
                minItems: 1
        - if:
            properties:
              status:
                enum: [checker_unknown, schema_invalid]
            required: [status]
          then:
            properties:
              reason_refs:
                minItems: 1
    StatusAuthorityView:
      type: object
      required:
        - certificate_id
        - schema_profile_ref
        - canonicalization_profile_ref
        - manifest_digest
        - validation_result_ref
        - proposed_use_ref
        - fold_context_ref
        - status_coordinates_ref
        - blocking_set_ref
        - dominant_status
        - status_observation_context_ref
        - prefix_view_ref
        - completion_admission_ref
        - residual_context_ref
        - validity_view_ref
        - kernel_view_ref
        - exact_fiber_assoc_ref
        - fiber_assoc_view_ref
        - adjudication_views_ref
        - agreement_ref
        - gate_decision_ref
        - authority_outcome
        - set_refs
        - set_ref_records
        - artifact_refs
        - artifact_ref_records
        - obligation_refs
        - obligation_ref_records
        - reason_refs
        - reason_ref_records
        - blocking_records
        - proof_refs
        - proof_ref_records
        - ledger_entries
        - stage_blockers
      properties:
        certificate_id:
          type: string
        schema_profile_ref:
          type: string
        canonicalization_profile_ref:
          type: string
        manifest_digest:
          type: string
        validation_result_ref:
          type: string
        proposed_use_ref:
          type: string
        fold_context_ref:
          type: string
        status_coordinates_ref:
          type: string
        blocking_set_ref:
          type: string
        dominant_status:
          type: string
        status_observation_context_ref:
          type: string
        prefix_view_ref:
          type: string
        completion_admission_ref:
          type: string
        residual_context_ref:
          type: string
        validity_view_ref:
          type: string
        kernel_view_ref:
          type: string
        exact_fiber_assoc_ref:
          type: string
        fiber_assoc_view_ref:
          type: string
        adjudication_views_ref:
          type: string
        agreement_ref:
          type: string
        gate_decision_ref:
          type: string
        authority_outcome:
          $ref: "#/components/schemas/AuthorityOutcome"
        set_refs:
          type: array
          items:
            type: string
        set_ref_records:
          type: array
          items:
            $ref: "#/components/schemas/SetRef"
        artifact_refs:
          type: array
          items:
            type: string
        artifact_ref_records:
          type: array
          items:
            $ref: "#/components/schemas/ArtifactRef"
        obligation_refs:
          type: array
          items:
            type: string
        obligation_ref_records:
          type: array
          items:
            $ref: "#/components/schemas/ObligationRefRecord"
        reason_refs:
          type: array
          items:
            type: string
        reason_ref_records:
          type: array
          items:
            $ref: "#/components/schemas/TypedReasonRefRecord"
        blocking_records:
          type: array
          items:
            $ref: "#/components/schemas/AuthorityBlockingRecord"
        proof_refs:
          type: array
          items:
            type: string
        proof_ref_records:
          type: array
          items:
            $ref: "#/components/schemas/ProofRefRecord"
        ledger_entries:
          type: array
          items:
            $ref: "#/components/schemas/ReferenceLedgerEntry"
        stage_blockers:
          type: array
          items:
            type: string
      allOf:
        - if:
            required: [obligation_refs]
            properties:
              obligation_refs:
                minItems: 1
          then:
            properties:
              obligation_ref_records:
                minItems: 1
        - if:
            required: [dominant_status, authority_outcome]
            properties:
              dominant_status:
                const: expired
          then:
            properties:
              authority_outcome:
                properties:
                  layer:
                    const: status
                  code:
                    const: expired
                  direction:
                    const: none
        - if:
            required: [dominant_status, authority_outcome]
            properties:
              dominant_status:
                const: revoked
          then:
            properties:
              authority_outcome:
                properties:
                  layer:
                    const: status
                  code:
                    const: revoked
                  direction:
                    const: none
        - if:
            required: [dominant_status, authority_outcome]
            properties:
              dominant_status:
                const: superseded
          then:
            properties:
              authority_outcome:
                properties:
                  layer:
                    const: status
                  code:
                    const: superseded
                  direction:
                    const: none
        - if:
            required: [dominant_status, authority_outcome]
            properties:
              dominant_status:
                const: invalid
          then:
            properties:
              authority_outcome:
                properties:
                  layer:
                    const: status
                  code:
                    const: invalid
                  direction:
                    const: none
        - if:
            required: [dominant_status, authority_outcome]
            properties:
              dominant_status:
                const: conflict
          then:
            properties:
              authority_outcome:
                properties:
                  layer:
                    const: status
                  code:
                    const: conflict
                  direction:
                    const: none
        - if:
            required: [dominant_status, authority_outcome]
            properties:
              dominant_status:
                const: out_of_frame
          then:
            properties:
              authority_outcome:
                properties:
                  layer:
                    const: status
                  code:
                    const: out_of_frame
                  direction:
                    const: none
        - if:
            required: [dominant_status, authority_outcome]
            properties:
              dominant_status:
                const: unknown
          then:
            properties:
              authority_outcome:
                properties:
                  layer:
                    const: status
                  code:
                    const: unknown
                  direction:
                    const: none
        - if:
            required: [authority_outcome]
            properties:
              authority_outcome:
                required: [code]
                properties:
                  code:
                    not:
                      enum: [allow, accept, assert, active]
          then:
            properties:
              reason_ref_records:
                minItems: 1
              authority_outcome:
                required: [reason_ref_records]
                properties:
                  reason_ref_records:
                    minItems: 1
        - if:
            required: [authority_outcome]
            properties:
              authority_outcome:
                required: [gate_decision]
                properties:
                  gate_decision:
                    enum: [block, unknown]
          then:
            properties:
              reason_ref_records:
                minItems: 1
              blocking_records:
                minItems: 1
              authority_outcome:
                required: [reason_ref_records, blocking_records]
                properties:
                  code:
                    not:
                      enum: [allow, accept, reject, assert, deny, infeasible, active]
                  reason_ref_records:
                    minItems: 1
                  blocking_records:
                    minItems: 1
        - if:
            required: [authority_outcome]
            properties:
              authority_outcome:
                required: [code]
                properties:
                  code:
                    not:
                      enum: [allow, accept, reject, assert, deny, infeasible, active]
          then:
            properties:
              reason_ref_records:
                minItems: 1
              blocking_records:
                minItems: 1
              authority_outcome:
                required: [reason_ref_records, blocking_records]
                properties:
                  code:
                    not:
                      enum: [allow, accept, reject, assert, deny, infeasible, active]
                  reason_ref_records:
                    minItems: 1
                  blocking_records:
                    minItems: 1
        - if:
            required: [proposed_use_ref]
            not:
              required: [proposed_use_ref]
              properties:
                proposed_use_ref:
                  enum: [operational, frame-relative assessment, control_gating]
          then:
            properties:
              completion_admission_ref:
                const: not-applicable
              exact_fiber_assoc_ref:
                const: not-applicable
              fiber_assoc_view_ref:
                const: not-applicable
              adjudication_views_ref:
                const: not-applicable
              agreement_ref:
                const: not-applicable
        - if:
            required: [authority_outcome]
            properties:
              authority_outcome:
                required: [code]
                properties:
                  code:
                    enum: [accept, reject]
          then:
            properties:
              completion_admission_ref:
                not:
                  const: not-applicable
              exact_fiber_assoc_ref:
                not:
                  const: not-applicable
              fiber_assoc_view_ref:
                not:
                  const: not-applicable
              adjudication_views_ref:
                not:
                  const: not-applicable
              agreement_ref:
                not:
                  const: not-applicable
    ProposedUse:
      type: object
      required: [mode, claim, horizon, anchor]
      properties:
        mode:
          type: string
        claim:
          type: string
        horizon:
          type: integer
          minimum: 0
        anchor:
          type: string
        scope:
          type: array
          items:
            type: string
        consumer:
          type: [string, "null"]
        policy:
          type: [string, "null"]
        frame:
          type: [string, "null"]
        context:
          type: object
    ProofEvidenceRef:
      oneOf:
        - type: string
          pattern: "^(artifact:.+|sha(256|384|512):.+)$"
        - type: object
          required: [artifact_ref]
          allOf:
            - anyOf:
                - required: [status]
                - required: [proof_status]
                - required: [checker_status]
            - anyOf:
                - required: [artifact_digest]
                - required: [digest]
                - required: [reference_digest]
          additionalProperties: true
          properties:
            artifact_ref:
              type: string
              pattern: "^(artifact:.+|sha(256|384|512):.+)$"
            source_artifact:
              type: string
              pattern: "^(artifact:.+|sha(256|384|512):.+)$"
            source_path:
              type: string
              pattern: "^/.*$"
            artifact_digest:
              type: string
              pattern: "^sha(256|384|512):.+"
            digest:
              type: string
              pattern: "^sha(256|384|512):.+"
            reference_digest:
              type: string
              pattern: "^sha(256|384|512):.+"
            proof_kind:
              type: string
            status:
              type: string
            proof_status:
              type: string
            checker_status:
              type: string
            payload:
              type: object
    AcceptedProofEvidenceStatus:
      type: object
      required: [artifact_ref]
      allOf:
        - anyOf:
            - required: [status]
            - required: [proof_status]
            - required: [checker_status]
        - anyOf:
            - required: [artifact_digest]
            - required: [digest]
            - required: [reference_digest]
      additionalProperties: true
      properties:
        artifact_ref:
          type: string
          pattern: "^(artifact:.+|sha(256|384|512):.+)$"
        source_artifact:
          type: string
          pattern: "^(artifact:.+|sha(256|384|512):.+)$"
        source_path:
          type: string
          pattern: "^/.*$"
        artifact_digest:
          type: string
          pattern: "^sha(256|384|512):.+"
        digest:
          type: string
          pattern: "^sha(256|384|512):.+"
        reference_digest:
          type: string
          pattern: "^sha(256|384|512):.+"
        proof_kind:
          type: string
        status:
          type: string
        proof_status:
          type: string
        checker_status:
          type: string
        payload:
          type: object
    LifecycleEvent:
      type: object
      additionalProperties: true
      required: [event_id, certificate_id, time, logical_clock, kind]
      properties:
        event_id:
          type: string
        certificate_id:
          type: string
        time:
          type: string
        logical_clock:
          type: integer
          minimum: 0
        kind:
          type: string
        payload:
          type: object
        actor:
          type: [string, "null"]
        inputs:
          type: array
          items:
            type: string
        hashes:
          type: array
          items:
            type: string
        signature:
          type: [string, "null"]
        manifest_digest:
          type: [string, "null"]
        manifest_digest_ref:
          type: [string, "null"]
          pattern: "^(artifact:.+|sha(256|384|512):.+)$"
        event_manifest_ref:
          type: [string, "null"]
          pattern: "^(artifact:.+|sha(256|384|512):.+)$"
        manifest_digest_status:
          anyOf:
            - $ref: "#/components/schemas/AcceptedProofEvidenceStatus"
            - type: "null"
        event_manifest_digest_status:
          anyOf:
            - $ref: "#/components/schemas/AcceptedProofEvidenceStatus"
            - type: "null"
        signature_verifier_result:
          type: [string, "null"]
          enum: [pass, accepted, fail, conflict, unknown, null]
        signature_verifier_result_ref:
          type: [string, "null"]
          pattern: "^(artifact:.+|sha(256|384|512):.+)$"
        signature_verifier_result_status:
          anyOf:
            - $ref: "#/components/schemas/AcceptedProofEvidenceStatus"
            - type: "null"
        previous_event_commitment:
          type: [string, "null"]
        confluence_proof_ref:
          type: [string, "null"]
          pattern: "^(artifact:.+|sha(256|384|512):.+)$"
        log_root_ref:
          type: [string, "null"]
          pattern: "^(artifact:.+|sha(256|384|512):.+)$"
        causal_cut_ref:
          type: [string, "null"]
          pattern: "^(artifact:.+|sha(256|384|512):.+)$"
        trace_class_ref:
          type: [string, "null"]
          pattern: "^(artifact:.+|sha(256|384|512):.+)$"
        ancestry:
          type: array
          items:
            type: string
    StatusContext:
      type: object
      required: [status_time]
      properties:
        status_time:
          type: string
        event_log:
          type: array
          items:
            $ref: "#/components/schemas/LifecycleEvent"
        dependency_snapshot:
          type: object
          additionalProperties:
            type: string
        observation_records:
          type: array
          items:
            type: object
            additionalProperties: true
            properties:
              measurement_relation_ref:
                type: [string, "null"]
                pattern: "^(artifact:.+|sha(256|384|512):.+)$"
              representation_relation_ref:
                type: [string, "null"]
                pattern: "^(artifact:.+|sha(256|384|512):.+)$"
