name: Publish

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Build and verify release artifacts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - name: Set up Python
        run: uv python install 3.11
      - name: Install dependencies
        run: uv sync --all-groups --python 3.11
      - name: Ruff format check
        run: uv run ruff format --check .
      - name: Ruff lint
        run: uv run ruff check .
      - name: Mypy
        run: uv run mypy
      - name: Tests
        run: uv run pytest
      - name: Bandit
        run: uv run bandit -c pyproject.toml -r src
      - name: Pip audit
        run: uv run pip-audit --skip-editable
      - name: Primary conformance
        run: uv run python -m dfcc.cli conformance run --suite primary
      - name: Legacy conformance
        run: uv run python -m dfcc.cli conformance run --suite legacy
      - name: Build distributions
        run: uv build
      - name: Remove build helper files
        run: rm -f dist/.gitignore
      - name: Check distribution metadata
        run: uvx twine check dist/*.whl dist/*.tar.gz
      - name: Upload distributions
        uses: actions/upload-artifact@v4
        with:
          name: python-distributions
          path: |
            dist/*.whl
            dist/*.tar.gz
          if-no-files-found: error

  publish:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write
    steps:
      - name: Download distributions
        uses: actions/download-artifact@v4
        with:
          name: python-distributions
          path: dist
      - name: Publish package distributions to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

  github-release:
    name: Create GitHub release
    runs-on: ubuntu-latest
    needs: publish
    permissions:
      contents: write
    steps:
      - name: Download distributions
        uses: actions/download-artifact@v4
        with:
          name: python-distributions
          path: dist
      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.whl
            dist/*.tar.gz
          generate_release_notes: true
