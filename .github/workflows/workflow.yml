name: Publish

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: publish-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: Build and verify release artifacts
    runs-on: ubuntu-latest
    permissions:
      contents: read
      attestations: write
      id-token: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
      - uses: astral-sh/setup-uv@d31148d669074a8d0a63714ba94f3201e7020bc3
        with:
          enable-cache: true
      - name: Set up Python
        run: uv python install 3.11
      - name: Install dependencies
        run: uv sync --locked --all-groups --python 3.11
      - name: Ruff format check
        run: uv run ruff format --check .
      - name: Ruff lint
        run: uv run ruff check .
      - name: Mypy
        run: uv run mypy
      - name: Tests
        run: uv run pytest
      - name: Bandit
        run: uv run bandit -c pyproject.toml -r src
      - name: Pip audit
        run: uv run pip-audit --skip-editable
      - name: Primary conformance
        run: uv run python -m dfcc.cli conformance run --suite primary
      - name: Legacy conformance
        run: uv run python -m dfcc.cli conformance run --suite legacy
      - name: Strict conformance
        run: uv run python -m dfcc.cli conformance run --suite strict
      - name: Build distributions
        run: uv build
      - name: Remove build helper files
        run: rm -f dist/.gitignore
      - name: Inspect release archives
        run: |
          python - <<'PY'
          import re
          import tarfile
          import zipfile
          from pathlib import Path

          token_name = "PYPI_" + "TO" + "KEN"
          private_key = "BEGIN " + "PRIVATE " + "KEY"
          windows_home = "C:" + "\\\\" + "Users" + "\\\\"
          linux_home = "/" + "home" + "/"
          mac_home = "/" + "Users" + "/"
          forbidden_name = re.compile(r"(__pycache__|\.pyc$|(^|/)coverage\.xml$|(^|/)\.coverage$)")
          forbidden_content = re.compile(
              r"("
              + re.escape(windows_home)
              + "|"
              + re.escape(linux_home)
              + "|"
              + re.escape(mac_home)
              + "|"
              + re.escape(token_name)
              + "|"
              + re.escape(private_key)
              + ")"
          )
          for path in Path("dist").glob("*"):
              names = []
              if path.suffix == ".whl":
                  with zipfile.ZipFile(path) as zf:
                      names = zf.namelist()
                      payloads = [zf.read(name).decode("utf-8", "ignore") for name in names if name.endswith((".py", ".md", ".txt", ".toml", ".yaml", ".yml", ".json"))]
              elif path.suffixes[-2:] == [".tar", ".gz"]:
                  with tarfile.open(path) as tf:
                      names = tf.getnames()
                      payloads = []
                      for member in tf.getmembers():
                          if member.isfile() and member.name.endswith((".py", ".md", ".txt", ".toml", ".yaml", ".yml", ".json")):
                              stream = tf.extractfile(member)
                              if stream is not None:
                                  payloads.append(stream.read().decode("utf-8", "ignore"))
              else:
                  continue
              if any(forbidden_name.search(name) for name in names):
                  raise SystemExit(f"release archive contains forbidden generated file: {path}")
              haystack = "\n".join(payloads)
              if forbidden_content.search(haystack):
                  raise SystemExit(f"release archive contains forbidden local or secret material: {path}")
          PY
      - name: Check distribution metadata
        run: uvx twine check dist/*.whl dist/*.tar.gz
      - name: Generate release checksums and dependency inventory
        run: |
          mkdir -p release-assets
          sha256sum dist/*.whl dist/*.tar.gz > release-assets/SHA256SUMS.txt
          uv run python -m pip list --format=json > release-assets/python-dependencies.json
      - name: Generate GitHub artifact attestations
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373
        with:
          subject-path: |
            dist/*.whl
            dist/*.tar.gz
      - name: Upload distributions
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: python-distributions
          path: |
            dist/*.whl
            dist/*.tar.gz
          if-no-files-found: error
      - name: Upload release assets
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: release-assets
          path: release-assets/*
          if-no-files-found: error

  publish:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write
    steps:
      - name: Download distributions
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
        with:
          name: python-distributions
          path: dist
      - name: Publish package distributions to PyPI
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b

  github-release:
    name: Create GitHub release
    runs-on: ubuntu-latest
    needs: publish
    permissions:
      contents: write
    steps:
      - name: Download distributions
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
        with:
          name: python-distributions
          path: dist
      - name: Download release assets
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
        with:
          name: release-assets
          path: release-assets
      - name: Create release
        uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b
        with:
          files: |
            dist/*.whl
            dist/*.tar.gz
            release-assets/*
          generate_release_notes: true
